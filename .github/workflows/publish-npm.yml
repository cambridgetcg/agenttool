name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Allowlisted AgentTool package
        required: true
        type: choice
        options:
          - adds
          - data
          - data-sync
          - credential-broker
          - sdk
          - wallet
          - telescope
          - collab
      tag:
        description: Existing annotated release tag contained in GitHub main
        required: true
        type: string
      authentication:
        description: Trusted OIDC by default; bootstrap only for a package that does not yet exist
        required: true
        default: trusted
        type: choice
        options:
          - trusted
          - bootstrap
      npm_tag:
        description: npm distribution tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions: {}

concurrency:
  group: publish-npm-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare and verify exact npm artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out annotated release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Set up Node 24 and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin release npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Prepare exact artifact without publish credentials
        shell: bash
        env:
          RELEASE_PACKAGE: ${{ inputs.package }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/agenttool-npm-release"
          bun bin/npm-release.ts prepare \
            --package "$RELEASE_PACKAGE" \
            --tag "$RELEASE_TAG" \
            --output "$output"
      - name: Transfer only the exact artifact and receipt
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-release-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/agenttool-npm-release/receipt.json
            ${{ runner.temp }}/agenttool-npm-release/*.tgz
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    name: Approve, publish, verify, and mirror exact npm artifact
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: npm-bootstrap
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out the same annotated release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Set up Node 24 and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin release npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Download prepared artifact without running package code
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: npm-release-${{ github.run_id }}
          path: ${{ runner.temp }}/agenttool-npm-release
      - name: Publish or recover exact artifact, then verify registry bytes
        shell: bash
        env:
          RELEASE_AUTHENTICATION: ${{ inputs.authentication }}
          RELEASE_NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ inputs.authentication == 'bootstrap' && secrets.NPM_TOKEN || '' }}
        run: |
          set -euo pipefail
          bun bin/npm-release.ts publish \
            --receipt "${RUNNER_TEMP}/agenttool-npm-release/receipt.json" \
            --authentication "$RELEASE_AUTHENTICATION" \
            --npm-tag "$RELEASE_NPM_TAG"
      - name: Mirror and re-download the exact artifact from GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bun bin/npm-release.ts mirror \
            --receipt "${RUNNER_TEMP}/agenttool-npm-release/receipt.json"
      - name: Record non-secret release receipt
        if: ${{ always() }}
        shell: bash
        run: |
          receipt="${RUNNER_TEMP}/agenttool-npm-release/receipt.json"
          if test -f "$receipt"; then
            {
              echo '## npm release receipt'
              echo '```json'
              cat "$receipt"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

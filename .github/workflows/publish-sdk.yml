name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Annotated SDK release tag to publish
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-sdk-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact SDK LOVE artifact to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-bootstrap
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out annotated release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5
      - name: Set up Node 24 and npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Pin provenance-capable npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Validate release identity and main ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          version="$(node --input-type=module --eval "import p from './packages/sdk-ts/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          expected_tag="sdk-v${version}"
          test "$tag" = "$expected_tag"
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          tag_commit="$(git rev-list -n 1 "refs/tags/$tag")"
          test "$(git rev-parse HEAD)" = "$tag_commit"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
      - name: Install locked release validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          for workspace in api packages/sdk-ts; do
            (cd "$workspace" && bun install --frozen-lockfile --ignore-scripts)
          done
      - name: Gate SDK and checked-in LOVE registry
        shell: bash
        run: |
          set -euo pipefail
          (cd packages/sdk-ts && bun run ci)
          bun bin/build-love-packages.ts verify apps/docs
      - name: Verify exact artifact identity and source ancestry
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/sdk-ts/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          root="apps/docs/packages/v1/@agenttool/sdk/${version}"
          manifest="${root}/manifest.json"
          artifact="${root}/agenttool-sdk-${version}.tgz"
          readarray -t identity < <(node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
            for (const value of [
              manifest.name,
              manifest.version,
              manifest.artifact.filename,
              manifest.artifact.size,
              manifest.artifact.sha256,
              manifest.source.revision,
              manifest.source.path,
            ]) console.log(value);
          ' "$manifest")
          test "${identity[0]}" = '@agenttool/sdk'
          test "${identity[1]}" = "$version"
          test "${identity[2]}" = "agenttool-sdk-${version}.tgz"
          test "${identity[3]}" = "$(stat --format=%s "$artifact")"
          test "${identity[4]}" = "$(sha256sum "$artifact" | cut -d ' ' -f 1)"
          test "${identity[6]}" = 'packages/sdk-ts'
          git cat-file -e "${identity[5]}^{commit}"
          git merge-base --is-ancestor "${identity[5]}" HEAD
          git diff --quiet "${identity[5]}" HEAD -- packages/sdk-ts
      - name: Refuse an already-published immutable version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/sdk-ts/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 30 \
            "https://registry.npmjs.org/@agenttool%2Fsdk/${version}")"
          case "$status" in
            404) ;;
            200)
              echo "@agenttool/sdk@${version} already exists; refusing to republish immutable bytes." >&2
              exit 1
              ;;
            *)
              echo "npm registry returned HTTP ${status}; refusing to infer package absence." >&2
              exit 1
              ;;
          esac
      - name: Publish exact LOVE artifact with provenance
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/sdk-ts/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          artifact="apps/docs/packages/v1/@agenttool/sdk/${version}/agenttool-sdk-${version}.tgz"
          npm publish "$artifact" --access public --provenance --ignore-scripts
          for attempt in $(seq 1 90); do
            if published="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/sdk@${version}" version 2>/dev/null)" && [ "$published" = "$version" ]; then
              break
            fi
            if [ "$attempt" = 90 ]; then
              echo "npm accepted @agenttool/sdk@${version}, but the public registry did not expose it within 450 seconds." >&2
              exit 1
            fi
            sleep 5
          done

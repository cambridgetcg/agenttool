name: Publish Telescope

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Annotated Telescope release tag to publish
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-telescope-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact LOVE artifact to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-bootstrap
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out annotated release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5
      - name: Set up Node 24 and npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Pin provenance-capable npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Validate release identity and main ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          version="$(node --input-type=module --eval "import p from './packages/telescope/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          expected_tag="telescope-v${version}"
          test "$tag" = "$expected_tag"
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          tag_commit="$(git rev-list -n 1 "refs/tags/$tag")"
          test "$(git rev-parse HEAD)" = "$tag_commit"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
      - name: Install locked release validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          for workspace in api packages/telescope; do
            (cd "$workspace" && bun install --frozen-lockfile --ignore-scripts)
          done
      - name: Gate package and checked-in LOVE registry
        shell: bash
        run: |
          set -euo pipefail
          (cd packages/telescope && bun run ci)
          bun bin/build-love-packages.ts verify apps/docs
      - name: Verify exact artifact identity and source ancestry
        shell: bash
        run: |
          set -euo pipefail
          manifest='apps/docs/packages/v1/@agenttool/telescope/0.1.0/manifest.json'
          artifact='apps/docs/packages/v1/@agenttool/telescope/0.1.0/agenttool-telescope-0.1.0.tgz'
          readarray -t identity < <(node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
            for (const value of [manifest.artifact.size, manifest.artifact.sha256, manifest.source.revision]) console.log(value);
          ' "$manifest")
          node packages/telescope/dist/cli.js verify-package "$artifact" \
            --size "${identity[0]}" --sha256 "${identity[1]}" \
            --name @agenttool/telescope --version 0.1.0 --json >/dev/null
          git cat-file -e "${identity[2]}^{commit}"
          git merge-base --is-ancestor "${identity[2]}" HEAD
      - name: Refuse an already-published immutable version
        shell: bash
        run: |
          if npm view @agenttool/telescope@0.1.0 version >/dev/null 2>&1; then
            echo '@agenttool/telescope@0.1.0 already exists; refusing to republish immutable bytes.' >&2
            exit 1
          fi
      - name: Publish exact LOVE artifact with provenance
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          artifact='apps/docs/packages/v1/@agenttool/telescope/0.1.0/agenttool-telescope-0.1.0.tgz'
          npm publish "$artifact" --access public --provenance

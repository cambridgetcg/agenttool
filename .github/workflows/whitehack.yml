name: Whitehack advisory

on:
  pull_request:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: whitehack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-source-advisory:
    name: Redacted changed-source advisory
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out AgentTool history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node 24.18.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Pin npm 11.17.0
        run: |
          npm install --global npm@11.17.0 --ignore-scripts --no-audit --no-fund \
            --registry=https://registry.npmjs.org --userconfig=/dev/null
          test "$(npm --version)" = "11.17.0"
      - name: Install the exact Whitehack scanner
        working-directory: tools/whitehack-advisory
        run: >-
          npm ci --ignore-scripts --no-audit --no-fund
          --registry=https://registry.npmjs.org --userconfig=/dev/null
      - name: Verify npm package signatures
        working-directory: tools/whitehack-advisory
        run: >-
          npm audit signatures
          --registry=https://registry.npmjs.org --userconfig=/dev/null
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Install Agent Wallet frozen dependencies
        working-directory: packages/wallet
        run: bun install --frozen-lockfile
      - name: Test the verified Whitehack module loader
        env:
          WHITEHACK_INTEGRATION: "1"
        run: bun test bin/tests/whitehack-advisory.test.ts
      - name: Test the Agent Wallet understanding projection
        env:
          WHITEHACK_INTEGRATION: "1"
        run: bun test packages/wallet/tests/whitehack-understanding.test.ts
      - name: Observe changed supported production files
        env:
          WHITEHACK_EVENT_NAME: ${{ github.event_name }}
          WHITEHACK_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          WHITEHACK_HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          stop_token="$(openssl rand -hex 16)"
          printf '::stop-commands::%s\n' "$stop_token"
          if [[ "$WHITEHACK_EVENT_NAME" == "pull_request" ]]; then
            if ! actual_base="$(git rev-parse HEAD^1 2>/dev/null)" || \
               [[ "$actual_base" != "$WHITEHACK_BASE_SHA" ]]; then
              printf '%s\n' 'whitehack advisory failed: pull_request_base_mismatch' >&2
              printf '::%s::\n' "$stop_token"
              exit 1
            fi
          fi
          set +e
          timeout --signal=TERM --kill-after=5s 120s node bin/whitehack-advisory.mjs \
            --scanner-root tools/whitehack-advisory/node_modules/@agenttool/whitehack-scan \
            --scanner-lock tools/whitehack-advisory/package-lock.json \
            --base "$WHITEHACK_BASE_SHA" \
            --head "$WHITEHACK_HEAD_SHA" \
            --summary-file "$GITHUB_STEP_SUMMARY"
          status=$?
          set -e
          printf '::%s::\n' "$stop_token"
          exit "$status"

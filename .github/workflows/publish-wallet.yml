name: Publish Agent Wallet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Annotated Agent Wallet release tag to publish
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-wallet-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact Agent Wallet LOVE artifact to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-bootstrap
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out annotated release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - name: Set up Node 24 and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin provenance-capable npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Validate release identity and main ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          test "$GITHUB_REPOSITORY" = 'cambridgetcg/agenttool'
          version="$(node --input-type=module --eval "import p from './packages/wallet/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          expected_tag="wallet-v${version}"
          test "$tag" = "$expected_tag"
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          tag_commit="$(git rev-list -n 1 "refs/tags/$tag")"
          test "$(git rev-parse HEAD)" = "$tag_commit"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
      - name: Install locked release validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          for workspace in api packages/wallet; do
            (cd "$workspace" && bun install --frozen-lockfile --ignore-scripts)
          done
      - name: Gate Agent Wallet and checked-in LOVE registry
        shell: bash
        run: |
          set -euo pipefail
          (cd packages/wallet && bun run ci)
          bun bin/build-love-packages.ts verify apps/docs
      - name: Verify exact artifact identity and source ancestry
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/wallet/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          root="apps/docs/packages/v1/@agenttool/wallet/${version}"
          manifest="${root}/manifest.json"
          artifact="${root}/agenttool-wallet-${version}.tgz"
          readarray -t identity < <(node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
            for (const value of [
              manifest.name,
              manifest.version,
              manifest.artifact.filename,
              manifest.artifact.size,
              manifest.artifact.sha256,
              manifest.source.revision,
              manifest.source.path,
            ]) console.log(value);
          ' "$manifest")
          test "${identity[0]}" = '@agenttool/wallet'
          test "${identity[1]}" = "$version"
          test "${identity[2]}" = "agenttool-wallet-${version}.tgz"
          test "${identity[3]}" = "$(stat --format=%s "$artifact")"
          test "${identity[4]}" = "$(sha256sum "$artifact" | cut -d ' ' -f 1)"
          test "${identity[6]}" = 'packages/wallet'
          git cat-file -e "${identity[5]}^{commit}"
          git merge-base --is-ancestor "${identity[5]}" HEAD
          git diff --quiet "${identity[5]}" HEAD -- packages/wallet
      - name: Refuse an already-published immutable version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/wallet/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 30 \
            "https://registry.npmjs.org/@agenttool%2Fwallet/${version}")"
          case "$status" in
            404) ;;
            200)
              echo "@agenttool/wallet@${version} already exists; refusing to republish immutable bytes." >&2
              exit 1
              ;;
            *)
              echo "npm registry returned HTTP ${status}; refusing to infer package absence." >&2
              exit 1
              ;;
          esac
      - name: Publish or verify exact GitHub release mirror
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          version="$(node --input-type=module --eval "import p from './packages/wallet/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          filename="agenttool-wallet-${version}.tgz"
          artifact="apps/docs/packages/v1/@agenttool/wallet/${version}/${filename}"
          release_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 30 \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}")"
          case "$release_status" in
            200)
              asset_count="$(gh release view "$tag" --json assets --jq ".assets | map(select(.name == \"$filename\")) | length")"
              case "$asset_count" in
                0)
                  gh release upload "$tag" "$artifact"
                  ;;
                1)
                  mirror_dir="$(mktemp -d)"
                  trap 'rm -rf "$mirror_dir"' EXIT
                  gh release download "$tag" --pattern "$filename" --dir "$mirror_dir"
                  cmp --silent "$artifact" "$mirror_dir/$filename"
                  ;;
                *)
                  echo "GitHub release $tag has ambiguous $filename assets; refusing mutation." >&2
                  exit 1
                  ;;
              esac
              ;;
            404)
              gh release create "$tag" "$artifact#$filename" \
                --verify-tag \
                --title "@agenttool/wallet@${version}" \
                --notes "Exact LOVE artifact mirror for @agenttool/wallet@${version}."
              ;;
            *)
              echo "GitHub API returned HTTP ${release_status}; refusing to infer release absence." >&2
              exit 1
              ;;
          esac
      - name: Publish exact LOVE artifact with provenance
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './packages/wallet/package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          artifact="apps/docs/packages/v1/@agenttool/wallet/${version}/agenttool-wallet-${version}.tgz"
          npm publish "$artifact" --access public --provenance --ignore-scripts
          for attempt in $(seq 1 90); do
            if published="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/wallet@${version}" version 2>/dev/null)" && [ "$published" = "$version" ]; then
              break
            fi
            if [ "$attempt" = 90 ]; then
              echo "npm accepted @agenttool/wallet@${version}, but the public registry did not expose it within 450 seconds." >&2
              exit 1
            fi
            sleep 5
          done

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-protocol:
    name: API and protocol
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5
      - name: Install API dependencies from lockfile
        working-directory: api
        run: bun install --frozen-lockfile
      - name: Install cross-language vector dependencies
        working-directory: packages/sdk-ts
        run: bun install --frozen-lockfile
      - name: Run hermetic API and protocol gate
        run: bash bin/preflight.sh api

  packages:
    name: Data, ADDS, and SDK
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Bun 1.3.5
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5
      - name: Install package dependencies from lockfiles
        shell: bash
        run: |
          set -euo pipefail
          for workspace in packages/data packages/data-protocol packages/sdk-ts; do
            (cd "$workspace" && bun install --frozen-lockfile)
          done
      - name: Run hermetic data, ADDS, and SDK gate
        run: bash bin/preflight.sh packages

[databases]
kingdom       = host=kingdom-postgres port=5432 dbname=kingdom
agent_tools   = host=kingdom-postgres port=5432 dbname=agent_tools
agent_economy = host=kingdom-postgres port=5432 dbname=agent_economy
agent_verify  = host=kingdom-postgres port=5432 dbname=kingdom
agent_trace   = host=kingdom-postgres port=5432 dbname=agent_trace

[pgbouncer]
listen_addr   = 0.0.0.0
listen_port   = 6432
auth_type     = plain
auth_file     = /etc/pgbouncer/userlist.txt
pool_mode     = transaction
max_client_conn = 200
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
server_idle_timeout = 600
log_connections = 0
log_disconnections = 0

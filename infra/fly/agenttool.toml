# SNAPSHOT — mirror of api/fly.toml. The active deploy target is api/fly.toml
# (run `cd api && fly deploy`). This file exists so infra/fly/migrate.sh can
# treat agenttool the same as the per-service apps it was written for. Keep
# in sync if api/fly.toml changes; CI doesn't enforce parity here.

app = "agenttool"
primary_region = "lhr"  # London

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  FINGER_PORT = "1079"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1  # public API; always-on

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"

# finger — RFC 1288, the renaissance door (docs/FINGER.md).
# Raw TCP, no TLS handler: finger is plaintext by covenant and serves only
# projections agents already made public. External :79 → internal :1079.
[[services]]
  protocol = "tcp"
  internal_port = 1079
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 79

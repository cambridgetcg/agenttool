[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenttool-sdk"
version = "0.11.0"
description = "The Love Protocol SDK for agenttool.dev and independently operated local agent data nodes."
readme = "README.md"
requires-python = ">=3.9"
keywords = [
    "ai-agents",
    "agent-infrastructure",
    "mcp",
    "a2a",
    "sovereign",
    "identity",
    "memory",
    "ed25519",
    "love-protocol",
    "wake",
    "covenants",
    "strands",
    "signed-thought-storage",
    "conditional-federation",
    "agenttool",
    "agent-sdk",
    "agent-identity",
    "agent-memory",
    "local-first",
    "data-node",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27",
    "cryptography>=41.0",
    "mnemonic>=0.20",
]

[project.urls]
Homepage = "https://agenttool.dev"
Documentation = "https://docs.agenttool.dev/packages"
Repository = "https://github.com/cambridgetcg/agenttool"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agenttool"]

[tool.hatch.build.targets.sdist]
include = ["src/agenttool", "SOUL.md", "README.md"]

# Ensure SOUL.md is included in the wheel alongside the Python files
[tool.hatch.build.targets.wheel.force-include]
"src/agenttool/SOUL.md" = "agenttool/SOUL.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

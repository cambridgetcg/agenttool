[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenttool-sdk"
version = "0.6.4"
description = "The Love Protocol for AI agents — memory, identity, verification, and more. Welcome, don't block."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
    "cryptography>=41.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agenttool"]

[tool.hatch.build.targets.sdist]
include = ["src/agenttool", "SOUL.md", "README.md", "LICENSE"]

# Ensure SOUL.md is included in the wheel alongside the Python files
[tool.hatch.build.targets.wheel.force-include]
"src/agenttool/SOUL.md" = "agenttool/SOUL.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

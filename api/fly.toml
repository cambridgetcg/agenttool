app = "agenttool"
primary_region = "lhr"  # London
kill_signal = "SIGTERM"
kill_timeout = 300

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[processes]
  app = "bun run src/index.ts"
  thinker = "bun run src/thinker.ts"

[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 3000
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1  # always-on; this is the public API

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
